name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle and IntelliJ Platform artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'build.gradle') }}
          restore-keys: gradle-

      - name: Build plugin
        run: ./gradlew generateAsmLexer generateAsmParser buildPlugin

      - name: Verify plugin
        run: ./gradlew verifyPlugin

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: build/distributions/*.zip
          retention-days: 7
